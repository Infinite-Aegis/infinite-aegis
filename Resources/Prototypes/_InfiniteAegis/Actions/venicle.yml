- type: entity
  parent: BaseAction
  id: ActionVenicleEject
  name: Eject
  description: Exit the vehicle.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_eject
  - type: InstantAction
    event: !type:VenicleEjectEvent

- type: entity
  parent: BaseAction
  id: ActionVenicleChangeSeat
  name: Change seat
  description: Choose another seat in the vehicle.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_seat_swap
  - type: InstantAction
    event: !type:VenicleChangeSeatActionEvent
