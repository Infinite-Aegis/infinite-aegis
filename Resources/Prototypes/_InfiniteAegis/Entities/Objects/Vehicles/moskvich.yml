- type: entity
  id: Moskvich
  name: moskvich
  description: A compact drivable vehicle.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _InfiniteAegis/Objects/Vehicles/moskvich.rsi
    state: m1
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: false
  - type: InputMover
  - type: BlockMovement
    blockInteraction: false
    blockUse: false
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: GravityAffected
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.45,-1.4
          - 0.45,-1.4
          - 0.6,-1.15
          - 0.6,1.15
          - 0.45,1.4
          - -0.45,1.4
          - -0.6,1.15
          - -0.6,-1.15
        density: 450
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: true
  - type: Venicle
    maxForwardSpeed: 8
    maxReverseSpeed: 3
    forwardEngineForce: 6000
    reverseEngineForce: 3500
    brakeForce: 14000
    rollingResistance: 250
    aerodynamicDrag: 12
    frontCorneringStiffness: 9000
    rearCorneringStiffness: 11000
    maxLateralGrip: 14000
    maxSteeringAngle: 35
    steeringRate: 2.5
    steeringReturnRate: 4
    wheelBase: 2.2
    angularResistance: 2500
    tileFrictionModifier: 0.15
    driverWhitelist:
      components:
      - HumanoidProfile
  - type: ContainerContainer
    containers:
      driver-slot: !type:ContainerSlot {}
