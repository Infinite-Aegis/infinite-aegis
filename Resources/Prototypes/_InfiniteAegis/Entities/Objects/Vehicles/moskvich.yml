- type: entity
  id: Moskvich
  name: moskvich
  description: A compact drivable vehicle.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _InfiniteAegis/Objects/Vehicles/moskvich.rsi
    state: m1
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: false
  - type: MobCollision
    fixtureId: mobcollision
  - type: MobMover
  - type: InputMover
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.25
    baseSprintSpeed: 3.6
  - type: Physics
    bodyType: KinematicController
  - type: GravityAffected
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.6,-1.4
          - 0.6,-1.4
          - 0.6,1.4
          - -0.6,1.4
        density: 1000
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: true
      mobcollision:
        shape: !type:PolygonShape
          vertices:
          - -0.6,-1.4
          - 0.6,-1.4
          - 0.6,1.4
          - -0.6,1.4
        density: 1000
        mask:
        - FullTileLayer
        hard: false
  - type: Venicle
    driverWhitelist:
      components:
      - HumanoidProfile
  - type: ContainerContainer
    containers:
      driver-slot: !type:ContainerSlot {}
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
