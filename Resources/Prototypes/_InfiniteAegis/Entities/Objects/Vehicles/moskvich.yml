- type: entity
  id: VenicleSeatMarker
  categories: [ HideSpawnMenu ]
  name: vehicle seat
  components:
  - type: VenicleSeat
  - type: Clickable
    bounds:
      all: "-0.3,-0.3,0.3,0.3"
  - type: Sprite
    sprite: Interface/Actions/actions_mecha.rsi
    state: mech_seat_swap
    drawdepth: Effects
    color: "#ffffff00"
    scale: 0.55, 0.55

- type: entity
  id: Moskvich
  name: moskvich
  description: A compact drivable vehicle.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _InfiniteAegis/Objects/Vehicles/moskvich.rsi
    state: m1
  - type: Transform
    anchored: false
  - type: InputMover
  - type: BlockMovement
    blockInteraction: false
    blockUse: false
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: GravityAffected
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.45,-1.4
          - 0.45,-1.4
          - 0.6,-1.15
          - 0.6,1.15
          - 0.45,1.4
          - -0.45,1.4
          - -0.6,1.15
          - -0.6,-1.15
        density: 450
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: true
  - type: Venicle
    maxSeatInteractionSpeed: 0.15
    maxSeatInteractionAngularSpeed: 0.1
    seats:
    - id: driver
      driver: true
      occupantOffset: -0.28,-0.45
      exitOffset: -1.10,-0.45
    - id: front-passenger
      occupantOffset: 0.28,-0.45
      exitOffset: 1.10,-0.45
    - id: rear-left-passenger
      occupantOffset: -0.28,0.45
      exitOffset: -1.10,0.45
    - id: rear-right-passenger
      occupantOffset: 0.28,0.45
      exitOffset: 1.10,0.45
    maxForwardSpeed: 8
    maxReverseSpeed: 3
    forwardEngineForce: 6000
    reverseEngineForce: 3500
    brakeForce: 14000
    rollingResistance: 250
    aerodynamicDrag: 12
    frontCorneringStiffness: 12000
    rearCorneringStiffness: 11000
    maxLateralGrip: 14000
    maxSteeringAngle: 35
    steeringRate: 4
    steeringReturnRate: 4
    wheelBase: 2.2
    angularResistance: 1500
    steeringAngularResistanceModifier: 0.25
    tileFrictionModifier: 0.05
    occupantWhitelist:
      components:
      - HumanoidProfile
