name: Сообщить о проблеме на карте
description: Сообщите об ошибке карты, шаттла, локации или игрового грида.
title: "[MAP] "
labels:
  - "type: mapping"
body:
  - type: markdown
    attributes:
      value: |
        Используйте этот шаблон для ошибок, связанных с картами и игровыми локациями Infinite Aegis.

        Для предложений и обсуждений используйте Discord:
        https://discord.gg/t8XAuymcDs

  - type: input
    id: version
    attributes:
      label: Версия
      description: Укажите версию игры, номер сборки или хеш коммита, если он известен.
      placeholder: Например, 627d398573
    validations:
      required: false

  - type: input
    id: map
    attributes:
      label: Карта или локация
      description: Укажите название карты, шаттла, здания, района или другого грида.
      placeholder: Название карты или описание места
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Точное место
      description: Опишите помещение, координаты, ориентиры или другой способ найти проблемное место.
      placeholder: Например, второй этаж здания напротив бара.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Описание проблемы
      description: Расскажите, что расположено или работает неправильно.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Как обнаружить проблему
      description: Опишите действия, необходимые для проверки.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Скриншоты или видео
      description: Желательно приложить изображение проблемного места.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Дополнительная информация
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Подтверждение
      options:
        - label: Я проверил, что похожая проблема ещё не была зарегистрирована.
          required: true
