name: Сообщить об ошибке
description: Сообщите об ошибке или некорректном поведении Infinite Aegis.
title: "[BUG] "
labels:
  - "Type: Bug"
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение об ошибке.

        Перед созданием Issue убедитесь, что похожая проблема ещё не была зарегистрирована.

        Для вопросов, предложений и обсуждений используйте Discord:
        https://discord.gg/t8XAuymcDs

  - type: input
    id: version
    attributes:
      label: Версия
      description: Укажите версию игры, номер сборки или хеш коммита, если он известен.
      placeholder: Например, 627d398573
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Описание проблемы
      description: Подробно опишите, что произошло и какое поведение ожидалось.
      placeholder: |
        Фактическое поведение:

        Ожидаемое поведение:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Шаги воспроизведения
      description: Перечислите действия, после которых возникает проблема.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Частота возникновения
      options:
        - Возникает каждый раз
        - Возникает часто
        - Возникает иногда
        - Произошло один раз
        - Не удалось определить
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: Приложите соответствующие логи или текст ошибки. Не публикуйте пароли, токены и другие секретные данные.
      render: shell
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Скриншоты или видео
      description: Добавьте материалы, если они помогают понять проблему.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Дополнительная информация
      description: Укажите всё остальное, что может помочь при рассмотрении проблемы.
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Подтверждение
      options:
        - label: Я проверил, что похожая проблема ещё не была зарегистрирована.
          required: true
        - label: Я не включил в Issue пароли, токены или другие секретные данные.
          required: true
